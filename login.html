<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram • Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
/* Instagram font feel */
@import url('https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap');
.logo {
  font-family: 'Grand Hotel', cursive;
}
</style>
</head>

<body class="bg-[#fafafa] flex items-center justify-center min-h-screen">

<div class="flex w-full max-w-4xl">

  <!-- Left Image (Desktop only) -->
  <div class="hidden md:flex w-1/2 items-center justify-center">
    <img src="https://img.freepik.com/free-vector/instagram-icon_1057-2227.jpg?t=st=1775742224~exp=1775745824~hmac=f5f26ddb28797c0c4184506e404169dfc21264cf4c2da79d483652244ffa8b05&w=1060" class="max-h-[600px]" />
  </div>

  <!-- Right Login -->
  <div class="w-full md:w-1/2 flex flex-col items-center">

    <!-- Login Box -->
    <div class="bg-white border w-[350px] p-8 mt-6">

      <!-- Logo -->
      <h1 class="logo text-4xl text-center mb-6">Instagram</h1>

      <!-- Inputs -->
      <input id="email" type="text" placeholder="Phone number, username, or email"
        class="w-full mb-2 p-2 border rounded bg-gray-50 text-sm"/>

      <input id="password" type="password" placeholder="Password"
        class="w-full mb-3 p-2 border rounded bg-gray-50 text-sm"/>

      <!-- Login Button -->
      <button onclick="login()"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded font-semibold">
        Log In
      </button>

      <!-- Divider -->
      <div class="flex items-center my-4">
        <div class="flex-1 h-px bg-gray-300"></div>
        <span class="px-3 text-gray-400 text-sm">OR</span>
        <div class="flex-1 h-px bg-gray-300"></div>
      </div>

      <!-- Facebook Login -->
      <div class="text-center text-blue-900 font-semibold text-sm cursor-pointer">
        Log in with Facebook
      </div>

      <!-- Forgot -->
      <p class="text-xs text-center mt-3 text-gray-500 cursor-pointer">
        Forgot password?
      </p>

    </div>

    <!-- Signup Box -->
    <div class="bg-white border w-[350px] p-4 text-center mt-3 text-sm">
      Don't have an account?
      <a href="signup.html" class="text-blue-500 font-semibold">Sign up</a>
    </div>

  </div>

</div>

<script>
const API = "http://localhost:3000/api"

async function login(){
  const res = await fetch(API + "/auth/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  })

  const data = await res.json()

  if(data.token){
    localStorage.setItem("token", data.token)
    location = "index.html"
  }else{
    alert("Invalid credentials")
  }
}
</script>

</body>
</html>
