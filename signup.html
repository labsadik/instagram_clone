<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram • Sign up</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap');
.logo {
  font-family: 'Grand Hotel', cursive;
}
</style>
</head>

<body class="bg-[#fafafa] flex items-center justify-center min-h-screen">

<div class="flex w-full max-w-4xl">

  <!-- Left Image (Desktop only) -->
  <div class="hidden md:flex w-1/2 items-center justify-center">
    <img src="https://img.freepik.com/free-vector/instagram-icon_1057-2227.jpg?t=st=1775742224~exp=1775745824~hmac=f5f26ddb28797c0c4184506e404169dfc21264cf4c2da79d483652244ffa8b05&w=1060" class="max-h-[600px]" />
  </div>

  <!-- Right Signup -->
  <div class="w-full md:w-1/2 flex flex-col items-center">

    <!-- Signup Box -->
    <div class="bg-white border w-[350px] p-8 mt-6">

      <!-- Logo -->
      <h1 class="logo text-4xl text-center mb-4">Instagram</h1>

      <!-- Subtitle -->
      <p class="text-center text-gray-500 text-sm mb-4">
        Sign up to see photos and videos from your friends.
      </p>

      <!-- Facebook -->
      <button class="w-full bg-blue-600 text-white py-2 rounded font-semibold mb-3">
        Log in with Facebook
      </button>

      <!-- Divider -->
      <div class="flex items-center my-4">
        <div class="flex-1 h-px bg-gray-300"></div>
        <span class="px-3 text-gray-400 text-sm">OR</span>
        <div class="flex-1 h-px bg-gray-300"></div>
      </div>

      <!-- Inputs -->
      <input id="email" type="text" placeholder="Mobile Number or Email"
        class="w-full mb-2 p-2 border rounded bg-gray-50 text-sm"/>

      <input id="username" placeholder="Username"
        class="w-full mb-2 p-2 border rounded bg-gray-50 text-sm"/>

      <input id="password" type="password" placeholder="Password"
        class="w-full mb-3 p-2 border rounded bg-gray-50 text-sm"/>

      <!-- Signup Button -->
      <button onclick="signup()"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded font-semibold">
        Sign up
      </button>

      <!-- Terms -->
      <p class="text-xs text-gray-400 text-center mt-4">
        By signing up, you agree to our Terms, Privacy Policy and Cookies Policy.
      </p>

    </div>

    <!-- Login Box -->
    <div class="bg-white border w-[350px] p-4 text-center mt-3 text-sm">
      Have an account?
      <a href="login.html" class="text-blue-500 font-semibold">Log in</a>
    </div>

  </div>

</div>

<script>
const API = "http://localhost:3000/api"

async function signup(){
  const res = await fetch(API + "/auth/signup", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      username: username.value,
      email: email.value,
      password: password.value
    })
  })

  if(res.ok){
    alert("Signup successful")
    location = "login.html"
  } else {
    alert("Signup failed")
  }
}
</script>

</body>
</html>
